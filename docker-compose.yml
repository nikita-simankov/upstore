services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: upstore
      POSTGRES_PASSWORD: upstore
      POSTGRES_DB: upstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
